server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /app;
    index index.html index.htm index.php;

    charset utf-8;
    client_max_body_size 100M;

    # 🔥 Основная логика перезаписи (как в вашем рабочем конфиге)
    location / {
        if (!-e $request_filename) {
            rewrite ^/manager/(.*)$ /manager/index.php last;
            rewrite ^/(.*)$ /index.php?q=$1 last;
        }
        try_files $uri $uri/ =404;
    }

    # Статика и служебные файлы
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ ^/assets/.+\.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        fastcgi_intercept_errors off;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
        fastcgi_connect_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_read_timeout 300;
    }


    # Логи
    access_log /var/log/nginx/host.access.log main;
    error_log /var/log/nginx/host.error.log error;

    # Важно для Docker-томов
    sendfile off;

    # 🔥 Обработка PHP через FastCGI (адаптировано под Docker)
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php:9000;  # ← Имя сервиса из docker-compose
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        fastcgi_intercept_errors off;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
        fastcgi_connect_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_read_timeout 300;
    }

    # Исключения из перезаписи: статика и служебные директории
    location ~* ^/(assets|js|css|images|img|install)/ {
        try_files $uri $uri/ =404;
        expires max;
        add_header Cache-Control "public, immutable";
    }

    # Защита служебных файлов
    location ~ /\.ht {
        deny all;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(env|json|yaml|yml|sh|sql|log|ini|bak)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Health check
    location /ping {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
